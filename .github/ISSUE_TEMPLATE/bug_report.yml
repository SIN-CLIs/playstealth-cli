name: Bug report
description: Something is broken or misbehaving.
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please provide the information below so we can reproduce fast.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One-paragraph description of the problem.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps + config. Include the `run_id` if you have one.
      placeholder: |
        1. Set env vars ...
        2. Run `python -m worker run --dry-run`
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / run_summary.json
      description: Paste the relevant log lines or attach the artefacts. Redact secrets first.
      render: json
  - type: input
    id: version
    attributes:
      label: Worker version
      placeholder: e.g. 2.0.0
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: e.g. 3.13.1
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS
        - Linux
        - Docker
        - HuggingFace Space
        - Other
    validations:
      required: true
