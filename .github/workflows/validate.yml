name: validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install uv
        run: pip install uv
      - name: Install deps
        run: |
          uv venv
          uv pip install pytest pytest-asyncio
      - name: Run tests
        run: |
          source .venv/bin/activate
          python -m pytest tests/contract tests/runtime tests/interaction tests/stealth tests/validation -q
      - name: Static contract harness
        run: |
          source .venv/bin/activate
          python -c "from opensin_validation import ValidationHarness; r=ValidationHarness().static(); import sys; sys.exit(0 if r.ok else 1)"
