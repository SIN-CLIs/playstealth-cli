# ================================================================================
# WORKFLOW: secrets.yml
# PROJEKT: A2A-SIN-Worker-heyPiggy
# ZWECK: CI Gate für Secrets und Infisical Sync Enforcement
# ================================================================================
#
# Runs on every push/PR to ensure:
# 1. No .env files are accidentally committed
# 2. No hardcoded secrets in code
# 3. Infisical is in sync (optional, controlled by input)
#
# This workflow blocks the merge if secrets are detected.
#

name: Secrets & Infisical

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_audit:
        description: 'Run Infisical drift audit'
        required: false
        default: 'false'
        type: boolean

# Cancel superseded runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write  # Required for OIDC to Infisical

env:
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  # =========================================================================
  # JOB: detect-secrets
  # PRÜFT: Keine .env oder Secrets im Commit
  # =========================================================================
  detect-secrets:
    name: Detect secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Full history for comprehensive scan

      # Check for .env files in the diff
      - name: Check for .env files
        run: |
          # Get list of changed .env files (including deleted)
          ENV_FILES=$(git diff --name-only --diff-filter=ACD HEAD 2>/dev/null | grep -E '^\.env' || true)
          
          if [ -n "$ENV_FILES" ]; then
            echo "Found .env files in commit:"
            echo "$ENV_FILES"
            echo ""
            echo "WARNING: .env files should NEVER be committed."
            echo "   Use Infisical for secrets: https://infisical.com"
            exit 1
          fi
          echo "No .env files in commit"

      # Basic trufflehog scan for common secret patterns
      - name: Scan for potential secrets
        uses: trufflesecurity/trufflehog@main
        with:
          base: HEAD~1
          head: HEAD
          extra_args: "--only-verified"
        continue-on-error: true

  # =========================================================================
  # JOB: infisical-audit
  # PRÜFT: Ob lokale Env-Files mit Infisical drift haben
  # =========================================================================
  infisical-audit:
    name: Infisical drift audit
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch'
      && inputs.run_audit == 'true'
      || github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Infisical CLI
        run: |
          curl -1sLf 'https://dl.cloudsmith.io/public/infisical/infisical-cli/gpg/infisical-chefs.gpg.key' \
            | gpg --dearmor -o /usr/share/keyrings/infisical-archive-keyring.gpg
          curl -1sLf 'https://dl.cloudsmith.io/public/infisical/infisical-cli/config.deb.txt' \
            | tee /etc/apt/sources.list.d/infisical.list
          apt-get update && apt-get install -y infisical || echo "CLI install skipped"

      - name: Install Python deps
        run: pip install -e .

      - name: Run Infisical audit
        env:
          INFISICAL_TOKEN: ${{ secrets.INFISICAL_SERVICE_TOKEN }}
        run: |
          if [ -z "$INFISICAL_TOKEN" ]; then
            echo "INFISICAL_SERVICE_TOKEN not set - skipping audit"
            exit 0
          fi
          heypiggy-worker audit --fail-fast
        continue-on-error: true

      - name: Report audit status
        run: |
          if [ $? -eq 0 ]; then
            echo "Infisical audit passed - no drift detected"
          else
            echo "Infisical drift detected!"
            echo "Run heypiggy-worker sync-envs to sync local env files to Infisical"
            exit 1
          fi

  # =========================================================================
  # JOB: validate-python-secrets
  # PRÜFT: Python-Dateien auf hardcodierte Secrets
  # =========================================================================
  validate-python:
    name: Validate Python secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install detection deps
        run: pip install detect-secrets

      - name: Run detect-secrets
        run: |
          if [ -f .secrets.baseline ]; then
            detect-secrets scan --baseline .secrets.baseline
          else
            detect-secrets scan .
          fi
        continue-on-error: true

  # =========================================================================
  # JOB: ci-gate
  # SAMMELT: Alle Results und blockt bei Fehlern
  # =========================================================================
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs: [detect-secrets, validate-python]
    if: always()
    steps:
      - name: Check gate status
        run: |
          echo "Secrets enforcement complete"
          echo "detect-secrets: ${{ needs.detect-secrets.result }}"
          echo "validate-python: ${{ needs.validate-python.result }}"
          
          if [ "${{ needs.detect-secrets.result }}" == "failure" ]; then
            echo "Secret detection failed - blocking merge"
            exit 1
          fi
          echo "All checks passed"
