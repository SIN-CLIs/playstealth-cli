name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs for the same branch/PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  # PIP_NO_CACHE_DIR intentionally unset here: actions/setup-python@v5
  # runs `pip cache dir` for its caching layer, and setting this var to
  # any truthy value (including the string "off") disables pip's cache
  # entirely and makes setup-python fail. If you ever need to force
  # no-cache for a single step, set it inline on that step only.
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: Install dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Ruff (lint)
        run: ruff check .
      - name: Ruff (format check)
        run: ruff format --check .

  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
          pip install -e .
      - name: Mypy (strict on worker/)
        run: mypy worker

  test:
    name: Tests (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
          pip install -e .
      - name: Pytest (+ coverage on 3.13)
        run: |
          if [ "${{ matrix.python }}" = "3.13" ]; then
            pytest --cov=worker --cov-branch --cov-report=xml --cov-report=term-missing
          else
            pytest
          fi
      - name: Upload coverage artefact
        if: matrix.python == '3.13'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: warn

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v4
      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: heypiggy-worker:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Smoke-test image
        run: |
          docker run --rm heypiggy-worker:ci python -c "import worker; print(worker.__version__)"
          docker run --rm heypiggy-worker:ci heypiggy-worker version
