name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly so new CVEs are surfaced even without a push.
    - cron: "17 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bandit:
    name: Bandit (SAST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install bandit
        run: |
          python -m pip install --upgrade pip
          pip install "bandit[toml]==1.7.10"
      - name: Bandit scan (worker/)
        run: bandit -c pyproject.toml -r worker -f txt

  pip-audit:
    name: pip-audit (SCA)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install "pip-audit==2.7.3"
      - name: Audit pinned requirements
        run: pip-audit --strict -r requirements.txt

  secrets:
    name: detect-secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install detect-secrets
        run: pip install "detect-secrets==1.5.0"
      - name: Scan against baseline
        run: detect-secrets scan --baseline .secrets.baseline
