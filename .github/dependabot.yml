version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - python
    groups:
      runtime:
        patterns:
          - "Pillow"
          - "structlog"
      dev:
        patterns:
          - "ruff"
          - "mypy"
          - "pytest*"
          - "bandit*"
          - "detect-secrets"
          - "pip-audit"
          - "pre-commit"
          - "types-*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: "Etc/UTC"
    labels:
      - dependencies
      - github-actions

  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: "Etc/UTC"
    labels:
      - dependencies
      - docker
